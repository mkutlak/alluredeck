version: "2"

run:
  timeout: 5m

linters:
  default: standard  # errcheck, gosimple, govet, ineffassign, staticcheck, unused
  enable:
    # --- existing ---
    - bodyclose          # HTTP response bodies closed
    - goconst            # Repeated string literals
    - gocritic           # Opinionated checks
    - misspell           # Spelling in comments/strings
    - noctx              # HTTP requests without context
    - prealloc           # Slice pre-allocation
    - revive             # golint replacement

    # --- bug catchers ---
    - durationcheck      # Duration multiplied together (e.g. 5 * time.Second * time.Millisecond)
    - err113             # Enforce sentinel errors and %w wrapping discipline
    - errorlint          # Incorrect error comparison / unwrap patterns
    - fatcontext         # context.WithValue in loops
    - forcetypeassert    # Unchecked type assertions
    - nilerr             # Returns nil despite checking err != nil
    - nilnesserr         # Returns nil-typed error interface from nil-valued concrete type
    - nilnil             # Simultaneous nil error + invalid value return
    - rowserrcheck       # sql.Rows.Err() must be checked
    - sqlclosecheck      # sql.Rows/Stmt must be closed
    - wastedassign       # Assignments whose value is never read

    # --- pattern enforcement ---
    - canonicalheader    # net/http.Header uses canonical form
    - copyloopvar        # Loop variable copy detection
    - exptostd           # Replace golang.org/x/exp with stdlib equivalents
    - intrange           # Use integer range in for loops
    - mirror             # Prefer bytes/strings equivalent functions
    - modernize          # Modern Go language/stdlib patterns
    - musttag            # Require JSON/YAML tags on marshaled struct fields
    - nosprintfhostport  # Don't fmt.Sprintf("host:port")
    - perfsprint         # Replace fmt.Sprintf with faster alternatives
    - unconvert          # Remove unnecessary type conversions
    - unparam            # Unused function parameters
    - usestdlibvars      # Use http.StatusOK instead of 200, etc.
    - wrapcheck          # Errors from external packages must be wrapped

    # --- complexity gates ---
    - cyclop             # Cyclomatic complexity per function
    - funlen             # Function length
    - gocognit           # Cognitive complexity
    - maintidx           # Maintainability index
    - nestif             # Deeply nested if statements

    # --- security ---
    - gosec              # OWASP-style security checks

    # --- code hygiene ---
    - asciicheck         # Non-ASCII identifiers
    - dupword            # Duplicate words in comments/strings
    - gochecknoglobals   # No package-level variables
    - nakedret           # Naked returns in long functions
    - nolintlint         # Require explanations on //nolint directives
    - predeclared        # Shadowing of built-in identifiers (len, error, etc.)
    - reassign           # Accidental reassignment of package-level variables
    - recvcheck          # Mixed pointer/value receivers on same type
    - whitespace         # Spurious blank lines at start/end of blocks

  exclusions:
    generated: strict   # Excludes files with "// Code generated" header (e.g. swagger/docs.go)
    rules:
      # Tests get relaxed complexity, error-wrapping, and global-var rules
      - path: '_test\.go'
        linters:
          - cyclop
          - err113
          - funlen
          - gochecknoglobals
          - gocognit
          - goconst
          - gocritic
          - maintidx
          - wrapcheck
      # swagger/docs.go uses init() and package-level globals (generated)
      - path: 'internal/swagger/'
        linters:
          - gochecknoglobals
          - nolintlint
      # migrations.go uses package-level version tracking variables
      - path: 'internal/store/migrations\.go'
        linters:
          - gochecknoglobals
      # G304: file inclusion via variable — legitimate in a file-serving API
      - linters: [gosec]
        text: 'G304'
    presets:
      - std-error-handling

  settings:
    cyclop:
      max-complexity: 15
      skip-tests: true

    funlen:
      lines: 100
      statements: 60

    gochecknoglobals:
      check-tests: false

    gocognit:
      min-complexity: 20

    goconst:
      min-occurrences: 3
      min-len: 4

    gocritic:
      enabled-tags: [diagnostic, style, performance]
      disabled-checks: [commentFormatting]

    gosec:
      confidence: medium

    maintidx:
      under: 20

    nakedret:
      max-func-complexity: 5

    nestif:
      min-complexity: 5

    nolintlint:
      require-explanation: true
      allow-unused: false

    prealloc:
      simple: true
      range-loops: true
      for-loops: false

    revive:
      rules:
        - name: exported
          arguments: [disableStutteringCheck]
        - name: var-naming
        - name: indent-error-flow
        - name: error-return
        - name: error-strings
        - name: if-return
        - name: increment-decrement
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: unexported-return
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id

    unparam:
      check-exported: false

    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - errors.Join(

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/mkutlak/allure-docker-service
  exclusions:
    generated: strict
