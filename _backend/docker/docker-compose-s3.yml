# docker-compose-s3.yml — Allure Docker Service with MinIO S3 storage
#
# Usage:
#   docker compose -f docker/docker-compose-s3.yml up -d
#   # Upload results via API, reports stored in MinIO
#
# MinIO console:     http://localhost:9001 (minioadmin / minioadmin)
# Allure API:        http://localhost:5555
# Allure Dashboard:  http://localhost:7575 (admin / admin)

version: "3.9"

services:
  minio:
    image: minio/minio:latest
    container_name: allure-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: allure-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/allure-reports &&
        exit 0
      "

  allure-api:
    image: allure-docker-service:dev-s3
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: allure-api-s3
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      STORAGE_TYPE: "s3"
      S3_ENDPOINT: "http://minio:9000"
      S3_BUCKET: "allure-reports"
      S3_REGION: "us-east-1"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_PATH_STYLE: "true"
      CHECK_RESULTS_EVERY_SECONDS: "NONE"
      CORS_ALLOWED_ORIGINS: "http://localhost:7575"
      SECURITY_ENABLED: "1"
      SECURITY_USER: "admin"
      SECURITY_PASS: "admin"
      JWT_SECRET_KEY: "s3-dev-secret-change-in-production-32chars"
      KEEP_HISTORY: "true"
      KEEP_HISTORY_LATEST: "20"
    ports:
      - "5555:5050"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/version"]
      interval: 15s
      timeout: 5s
      retries: 5

  allure-dashboard-ui:
    image: allure-dashboard-ui:dev-s3
    build:
      context: ../../allure-dashboard-ui
      dockerfile: docker/Dockerfile
    container_name: allure-dashboard-ui-s3
    depends_on:
      allure-api:
        condition: service_healthy
    environment:
      VITE_API_URL: "http://localhost:5555"
      VITE_APP_TITLE: "Allure Dashboard (S3)"
    ports:
      - "7575:7474"
    restart: unless-stopped

volumes:
  minio-data:
