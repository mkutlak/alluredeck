# GitLab CI example: run tests and publish results to Allure Docker Service.
#
# Prerequisites:
#   - Allure Docker Service is running and reachable from your GitLab runner.
#   - If security is enabled, set these CI/CD variables in your project settings:
#       ALLURE_USERNAME, ALLURE_PASSWORD  (masked)
#
# Adjust the 'test' stage script to match your test framework.

variables:
  ALLURE_SERVER: "http://your-allure-host:5050"   # Change to your Allure service URL
  ALLURE_PROJECT_ID: "$CI_PROJECT_ID"             # Use GitLab project ID or a fixed name
  ALLURE_RESULTS_DIR: "allure-results"

stages:
  - test
  - report

test:
  stage: test
  script:
    # Replace with your actual test command, e.g.:
    # - pytest --alluredir=allure-results
    # - mvn test
    # - npx playwright test
    - echo "Replace this with your test command"
  artifacts:
    when: always
    paths:
      - allure-results/
    expire_in: 1 day
  allow_failure: true  # Always proceed to the report stage

send-to-allure:
  stage: report
  when: always
  dependencies:
    - test
  script:
    - |
      # Collect files
      FILES=""
      for f in $ALLURE_RESULTS_DIR/*; do
        [ -f "$f" ] && FILES="$FILES -F files[]=@$f"
      done

      # Login if credentials are set
      AUTH_HEADER=""
      if [ -n "$ALLURE_USERNAME" ] && [ -n "$ALLURE_PASSWORD" ]; then
        TOKEN=$(curl -sf -X POST "$ALLURE_SERVER/login" \
          -H "Content-Type: application/json" \
          -d "{\"username\":\"$ALLURE_USERNAME\",\"password\":\"$ALLURE_PASSWORD\"}" \
          | grep -o '"access_token":"[^"]*' | cut -d'"' -f4)
        AUTH_HEADER="Authorization: Bearer $TOKEN"
      fi

      CURL_AUTH=""
      [ -n "$AUTH_HEADER" ] && CURL_AUTH="-H \"$AUTH_HEADER\""

      # Send results
      eval curl -sf -X POST "$ALLURE_SERVER/send-results?project_id=$ALLURE_PROJECT_ID" \
        -H "Content-Type: multipart/form-data" \
        $CURL_AUTH $FILES

      # Generate report
      ENC_NAME=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" \
        "Pipeline #$CI_PIPELINE_ID")
      ENC_FROM=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" \
        "$CI_PIPELINE_URL")

      RESPONSE=$(eval curl -sf -X POST \
        "$ALLURE_SERVER/generate-report?project_id=$ALLURE_PROJECT_ID&execution_name=$ENC_NAME&execution_from=$ENC_FROM&execution_type=gitlab" \
        $CURL_AUTH)

      REPORT_URL=$(echo "$RESPONSE" | grep -o '"report_url":"[^"]*' | cut -d'"' -f4)
      echo "Allure Report: $REPORT_URL"
