basePath: /api/v1
definitions:
  internal_handlers.ConfigData:
    properties:
      api_response_less_verbose:
        type: boolean
      app_build_date:
        type: string
      app_build_ref:
        type: string
      app_version:
        type: string
      check_results_every_seconds:
        type: string
      dev_mode:
        type: boolean
      keep_history:
        type: boolean
      keep_history_latest:
        type: integer
      make_viewer_endpoints_public:
        type: boolean
      oidc_enabled:
        type: boolean
      security_enabled:
        type: boolean
      tls:
        type: boolean
      version:
        type: string
    type: object
  internal_handlers.ConfigMetaData:
    properties:
      message:
        type: string
    type: object
  internal_handlers.ConfigResponse:
    properties:
      data:
        $ref: '#/definitions/internal_handlers.ConfigData'
      metadata:
        $ref: '#/definitions/internal_handlers.ConfigMetaData'
    type: object
  internal_handlers.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  internal_handlers.VersionData:
    properties:
      version:
        type: string
    type: object
  internal_handlers.VersionMetaData:
    properties:
      message:
        type: string
    type: object
  internal_handlers.VersionResponse:
    properties:
      data:
        $ref: '#/definitions/internal_handlers.VersionData'
      metadata:
        $ref: '#/definitions/internal_handlers.VersionMetaData'
    type: object
  internal_handlers.setParentRequest:
    properties:
      parent_id:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for managing Allure test reports.
  title: AllureDeck API
  version: 2.0.0
paths:
  /admin/jobs:
    get:
      description: Returns all known async report generation jobs (active and recent).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List all jobs
      tags:
      - admin
  /admin/jobs/{job_id}:
    delete:
      description: Permanently removes a completed, failed, or cancelled job record.
      parameters:
      - description: Job ID
        in: path
        name: job_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      summary: Delete a terminal job
      tags:
      - admin
  /admin/jobs/{job_id}/cancel:
    post:
      description: Cancels a pending or running async report generation job.
      parameters:
      - description: Job ID
        in: path
        name: job_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      summary: Cancel a job
      tags:
      - admin
  /admin/results:
    get:
      description: Scans all projects and returns those with pending result files.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List projects with unprocessed result files
      tags:
      - admin
  /admin/results/{project_id}:
    delete:
      description: Removes all unprocessed result files from a project's results directory.
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Delete pending result files for a project
      tags:
      - admin
  /admin/results/group/{project_id}:
    delete:
      description: Deletes pending result files for all child projects of the given
        parent.
      parameters:
      - description: Parent project ID
        in: path
        name: project_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Clean results for all projects in a group
      tags:
      - admin
  /api-keys:
    get:
      description: Returns all API keys for the authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: List API keys
      tags:
      - api-keys
    post:
      consumes:
      - application/json
      description: Generates a new API key for the authenticated user (max 5 per user).
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      summary: Create an API key
      tags:
      - api-keys
  /api-keys/{id}:
    delete:
      description: Permanently removes an API key owned by the authenticated user.
      parameters:
      - description: API key ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Delete an API key
      tags:
      - api-keys
  /auth/session:
    get:
      description: Returns the authenticated user's session information from JWT claims.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Get current session info
      tags:
      - auth
  /config:
    get:
      description: Returns the current AllureDeck service configuration.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.ConfigResponse'
      summary: Get service configuration
      tags:
      - system
  /dashboard:
    get:
      description: Returns all projects with their latest build status and pass rate
        sparklines.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get cross-project dashboard data
      tags:
      - dashboard
  /health:
    get:
      description: Returns 200 OK with no dependency checks.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Liveness probe
      tags:
      - infrastructure
  /login:
    post:
      consumes:
      - application/json
      description: Validates credentials and issues JWT access and refresh tokens.
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Authenticate user
      tags:
      - auth
  /logout:
    delete:
      description: Revokes the current access and refresh tokens and expires auth
        cookies.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Log out
      tags:
      - auth
  /projects:
    get:
      description: Returns a paginated list of all existing projects. Supports top_level=true
        to return only top-level projects and parent_id=<id> to list children of a
        specific project.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: per_page
        type: integer
      - description: Return only top-level projects
        in: query
        name: top_level
        type: boolean
      - description: Return children of this project ID
        in: query
        name: parent_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: List projects
      tags:
      - projects
    post:
      consumes:
      - application/json
      description: Creates a new project directory and registers it in the database.
      parameters:
      - description: Project ID and optional parent
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      summary: Create a project
      tags:
      - projects
  /projects/{project_id}:
    delete:
      description: Removes an entire project and all its reports.
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Delete a project
      tags:
      - projects
  /projects/{project_id}/analytics/low-performing:
    get:
      description: Returns tests ranked by average duration or failure rate across
        recent builds.
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      - default: duration
        description: 'Sort by: duration or failure_rate'
        in: query
        name: sort
        type: string
      - default: 20
        description: Number of recent builds to consider
        in: query
        name: builds
        type: integer
      - default: 20
        description: Maximum results to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Get low-performing tests
      tags:
      - analytics
  /projects/{project_id}/branches:
    get:
      description: Returns all branches for a project.
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: List branches
      tags:
      - branches
  /projects/{project_id}/branches/{branch_id}:
    delete:
      description: Deletes a non-default branch from the project.
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      - description: Branch ID
        in: path
        name: branch_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      summary: Delete branch
      tags:
      - branches
  /projects/{project_id}/branches/{branch_id}/default:
    put:
      description: Sets the specified branch as the default for the project.
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      - description: Branch ID
        in: path
        name: branch_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Set default branch
      tags:
      - branches
  /projects/{project_id}/children:
    get:
      description: Returns all projects that have the given project as their parent.
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: List child projects
      tags:
      - projects
  /projects/{project_id}/compare:
    get:
      description: Returns a diff of test statuses between two builds within a project.
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      - description: Build order A (baseline)
        in: query
        name: a
        required: true
        type: integer
      - description: Build order B (target)
        in: query
        name: b
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Compare two builds
      tags:
      - compare
  /projects/{project_id}/jobs/{job_id}:
    get:
      description: Returns the current status of an async report generation job.
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      - description: Job ID
        in: path
        name: job_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Get async report generation job status
      tags:
      - reports
  /projects/{project_id}/known-issues:
    get:
      description: Returns all known issues for a project.
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      - description: Filter to active only
        in: query
        name: active_only
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: List known issues
      tags:
      - known-issues
    post:
      consumes:
      - application/json
      description: Records a new known issue for a project.
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      summary: Create a known issue
      tags:
      - known-issues
  /projects/{project_id}/known-issues/{issue_id}:
    delete:
      description: Permanently removes a known issue record.
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      - description: Known Issue ID
        in: path
        name: issue_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Delete a known issue
      tags:
      - known-issues
    put:
      consumes:
      - application/json
      description: Updates ticket_url, description, and/or active status.
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      - description: Known Issue ID
        in: path
        name: issue_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Update a known issue
      tags:
      - known-issues
  /projects/{project_id}/parent:
    delete:
      description: Removes the parent assignment from the given project.
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Remove project parent
      tags:
      - projects
    put:
      consumes:
      - application/json
      description: Assigns a parent project to the given project. The parent must
        exist, must not itself be a child, and the target must have no children and
        no existing builds.
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      - description: Parent payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.setParentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      summary: Set project parent
      tags:
      - projects
  /projects/{project_id}/pipeline-runs:
    get:
      description: Returns child-suite builds grouped by commit SHA for a parent project.
      parameters:
      - description: Parent project ID
        in: path
        name: project_id
        required: true
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Results per page
        in: query
        name: per_page
        type: integer
      - description: Filter by branch name
        in: query
        name: branch
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: List pipeline runs
      tags:
      - pipeline
  /projects/{project_id}/playwright:
    post:
      consumes:
      - application/gzip
      description: Uploads a Playwright HTML report as a tar.gz archive. The archive
        must contain index.html at its root and may include a data/ subdirectory with
        attachments.
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      - description: Auto-create project if missing
        in: query
        name: force_project_creation
        type: string
      - description: Parent project ID (used with force_project_creation)
        in: query
        name: parent_id
        type: string
      - description: Execution name
        in: query
        name: execution_name
        type: string
      - description: Execution from
        in: query
        name: execution_from
        type: string
      - description: CI branch name
        in: query
        name: ci_branch
        type: string
      - description: CI commit SHA
        in: query
        name: ci_commit_sha
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "413":
          description: Request Entity Too Large
          schema:
            additionalProperties: true
            type: object
      summary: Upload Playwright HTML report
      tags:
      - playwright
  /projects/{project_id}/rename:
    put:
      consumes:
      - application/json
      description: 'Changes the project ID. All builds, results, and storage are updated.
        Warning: this operation may cause data loss if interrupted during S3 storage
        migration.'
      parameters:
      - description: Current project ID
        in: path
        name: project_id
        required: true
        type: string
      - description: New project ID
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      summary: Rename a project
      tags:
      - projects
  /projects/{project_id}/reports:
    get:
      description: Returns paginated metadata for all generated reports of a project.
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get report history
      tags:
      - reports
    post:
      description: Triggers Allure report generation for the specified project.
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      - description: Execution name (CI provider, e.g. 'GitHub Actions')
        in: query
        name: execution_name
