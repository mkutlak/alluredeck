port: "9090"
dev_mode: true
security_enabled: true
admin_user: "yaml-admin"
admin_pass: "yaml-pass"
viewer_user: "yaml-viewer"
viewer_pass: "yaml-viewpass"
jwt_secret_key: "yaml-jwt-secret-that-is-long-enough"
make_viewer_endpoints_public: true
allure_version_path: "/yaml-version"
projects_path: "/yaml/projects"
check_results_every_secs: "5"
keep_history: true
keep_history_latest: 50
tls: true
api_response_less_verbose: true
cors_allowed_origins:
  - "https://a.example.com"
  - "https://b.example.com"
jwt_access_token_expires: 1800
jwt_refresh_token_expires: 86400
database_path: "/yaml/allure.db"
storage_type: "s3"
s3:
  endpoint: "http://minio-test:9000"
  bucket: "test-bucket"
  region: "eu-central-1"
  access_key: "test-access-key"
  secret_key: "test-secret-key"
  tls_insecureskipverify: true
  path_style: true
  concurrency: 5
