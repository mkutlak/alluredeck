# AllureDeck API - Example Configuration File
#
# Copy this file to config.yaml and adjust values as needed.
# Precedence (highest wins): environment variables > this file > built-in defaults.
#
# Set CONFIG_FILE=/path/to/config.yaml to load this file.
# Default location: /app/alluredeck/config.yaml
#
# Sensitive fields (passwords, secrets) should be set via environment variables
# rather than stored in this file.

# --- Server ---

# TCP port the API server listens on. Env var: PORT
# Default: "8080"
port: "8080"

# Enable development mode (verbose logging, relaxed checks). Env var: DEV_MODE
# Default: false
dev_mode: false

# Enable TLS. Requires TLS_CERT_FILE and TLS_KEY_FILE env vars. Env var: TLS
# Default: false
tls: false

# --- Security ---

# Enable HTTP Basic / JWT authentication. Env var: SECURITY_ENABLED
# Default: false
security_enabled: false

# Admin credentials (used when security_enabled: true).
# Prefer setting these via SECURITY_USER / SECURITY_PASS env vars.
security_user: ""
security_pass: ""

# Read-only viewer credentials.
# Prefer setting these via SECURITY_VIEWER_USER / SECURITY_VIEWER_PASS env vars.
viewer_user: ""
viewer_pass: ""

# JWT signing secret. MUST be changed in production when security_enabled: true.
# Prefer setting via JWT_SECRET_KEY env var.
# Default: "super-secret-key-for-dev"
jwt_secret: ""

# JWT access token lifetime in seconds. Env var: JWT_ACCESS_TOKEN_EXPIRES
# Default: 900 (15 minutes)
access_token_expiry_secs: 900

# JWT refresh token lifetime in seconds. Env var: JWT_REFRESH_TOKEN_EXPIRES
# Default: 2592000 (30 days)
refresh_token_expiry_secs: 2592000

# When true, viewer-role endpoints require no authentication. Env var: MAKE_VIEWER_ENDPOINTS_PUBLIC
# Default: false
make_viewer_endpoints_public: false

# Enable when running behind a trusted reverse proxy (nginx, ALB). Affects IP-based rate limiting.
# Env var: TRUST_X_FORWARDED_FOR
# Default: false
trust_forwarded_for: false

# --- Logging ---

# Log level. Valid values: debug, info, warn, error. Env var: LOG_LEVEL
# Default: "info"
log_level: "info"

# --- Storage ---

# Directory where Allure project results and reports are stored. Env var: STATIC_CONTENT_PROJECTS
# Default: "/app/projects"
projects_directory: "/app/projects"

# Path for the SQLite metadata database. Env var: DATABASE_PATH
# Default: "/app/allure.db"
database_path: "/app/allure.db"

# Retain report history between builds. Env var: KEEP_HISTORY
# Default: false
keep_history: false

# Number of historical reports to retain per project. Env var: KEEP_HISTORY_LATEST
# Default: 20
keep_history_latest: 20

# --- Report generation ---

# Seconds between automatic result scans. Use "NONE" to disable the watcher.
# Env var: CHECK_RESULTS_EVERY_SECONDS
# Default: "NONE"
check_results_secs: "NONE"

# Path to the file containing the Allure CLI version string. Env var: ALLURE_VERSION_FILE
# Default: "/app/version"
allure_version_path: "/app/version"

# --- UI / API behaviour ---

# Return minimal JSON responses from the API. Env var: API_RESPONSE_LESS_VERBOSE
# Default: false
api_response_less_verbose: false

# --- Storage Backend ---

# Backend storage type: "local" (filesystem) or "s3" (S3/MinIO). Env var: STORAGE_TYPE
# Default: "local"
storage_type: "local"

# --- S3/MinIO Storage (optional) ---

# S3/MinIO endpoint URL. Env var: S3_ENDPOINT
# MinIO local: "http://minio:9000"
# AWS S3: "https://s3.amazonaws.com"
# Required when storage_type: "s3"
s3_endpoint: ""

# S3 bucket name. Env var: S3_BUCKET
# Required when storage_type: "s3"
s3_bucket: ""

# AWS region. Env var: S3_REGION
# Default: "us-east-1"
s3_region: "us-east-1"

# S3 access key ID. Env var: S3_ACCESS_KEY
# Prefer setting via S3_ACCESS_KEY env var.
s3_access_key: ""

# S3 secret access key. Env var: S3_SECRET_KEY
# MUST be set via S3_SECRET_KEY env var in production.
s3_secret_key: ""

# Enable TLS for S3 connections. Env var: S3_USE_SSL
# Default: false
s3_use_ssl: false

# Use path-style S3 URLs (required for MinIO). Env var: S3_PATH_STYLE
# Default: false
s3_path_style: false

# Maximum parallel S3 operations (uploads/downloads). Env var: S3_CONCURRENCY
# Default: 10
s3_concurrency: 10

# --- CORS ---

# List of allowed origins for Cross-Origin Resource Sharing.
# Env var: CORS_ALLOWED_ORIGINS (comma-separated)
# Default: [] (CORS disabled)
cors_allowed_origins: []
#  - "https://dashboard.example.com"
#  - "https://ci.example.com"
