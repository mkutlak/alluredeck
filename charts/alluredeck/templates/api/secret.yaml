{{- if not .Values.api.security.existingSecret }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "alluredeck.api.fullname" .) }}
{{- $adminPassword := .Values.api.security.password }}
{{- $viewerPassword := .Values.api.security.viewerPassword }}
{{- $jwtSecretKey := .Values.api.security.jwtSecretKey }}
{{- if $existing }}
  {{- if not $adminPassword }}{{- $adminPassword = index $existing.data "adminPassword" | b64dec }}{{- end }}
  {{- if not $viewerPassword }}{{- $viewerPassword = index $existing.data "viewerPassword" | b64dec }}{{- end }}
  {{- if not $jwtSecretKey }}{{- $jwtSecretKey = index $existing.data "jwtSecretKey" | b64dec }}{{- end }}
{{- else }}
  {{- if not $adminPassword }}{{- $adminPassword = randAlphaNum 32 }}{{- end }}
  {{- if not $viewerPassword }}{{- $viewerPassword = randAlphaNum 32 }}{{- end }}
  {{- if not $jwtSecretKey }}{{- $jwtSecretKey = randAlphaNum 64 }}{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "alluredeck.api.fullname" . }}
  labels:
    {{- include "alluredeck.api.labels" . | nindent 4 }}
type: Opaque
data:
  adminUser: {{ .Values.api.security.user | b64enc | quote }}
  adminPassword: {{ $adminPassword | b64enc | quote }}
  viewerUser: {{ .Values.api.security.viewerUser | b64enc | quote }}
  viewerPassword: {{ $viewerPassword | b64enc | quote }}
  jwtSecretKey: {{ $jwtSecretKey | b64enc | quote }}
  jwtAccessTokenExpires: {{ .Values.api.security.jwtAccessTokenExpires | b64enc | quote }}
  jwtRefreshTokenExpires: {{ .Values.api.security.jwtRefreshTokenExpires | b64enc | quote }}
{{- end }}
