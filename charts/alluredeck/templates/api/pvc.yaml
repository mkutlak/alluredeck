{{- if eq (.Values.api.kind | default "Deployment") "Deployment" }}
{{- if and .Values.api.persistence.projects.enabled (eq .Values.api.config.storageType "local") (not .Values.api.persistence.projects.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "alluredeck.api.fullname" . }}-projects
  labels:
    {{- include "alluredeck.api.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.api.persistence.projects.accessMode }}
  {{- $sc := default .Values.global.storageClassName .Values.api.persistence.projects.storageClassName }}
  {{- if $sc }}
  storageClassName: {{ $sc | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.api.persistence.projects.size }}
{{- end }}
{{- end }}
