apiVersion: apps/v1
{{- $kind := .Values.api.kind | default "Deployment" }}
kind: {{ $kind }}
metadata:
  name: {{ include "alluredeck.api.fullname" . }}
  labels:
    {{- include "alluredeck.api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  revisionHistoryLimit: {{ .Values.api.revisionHistoryLimit }}
  {{- if eq $kind "Deployment" }}
  {{- with .Values.api.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
  {{- if eq $kind "StatefulSet" }}
  serviceName: {{ include "alluredeck.api.fullname" . }}-headless
  {{- with .Values.api.strategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "alluredeck.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/api/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/api/secret.yaml") . | sha256sum }}
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "alluredeck.api.labels" . | nindent 8 }}
        {{- with .Values.api.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "alluredeck.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "alluredeck.api.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.api.terminationGracePeriodSeconds }}
      {{- with .Values.api.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.api.dnsPolicy }}
      dnsPolicy: {{ . }}
      {{- end }}
      {{- with .Values.api.dnsConfig }}
      dnsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: alluredeck-api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command: ["/sbin/tini", "--"]
          args:
            - /app/alluredeck-api
            {{- range .Values.api.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - name: http-api
              containerPort: {{ .Values.api.service.port | int }}
              protocol: TCP
          env:
            - name: GOMEMLIMIT
              value: {{ .Values.api.config.goMemLimit | quote }}
            {{- $secretName := include "alluredeck.api.secretName" . }}
            - name: ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: adminUser
            - name: ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: adminPassword
            - name: VIEWER_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: viewerUser
            - name: VIEWER_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: viewerPassword
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: jwtSecretKey
            - name: JWT_ACCESS_TOKEN_EXPIRES
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: jwtAccessTokenExpires
            - name: JWT_REFRESH_TOKEN_EXPIRES
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: jwtRefreshTokenExpires
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: databaseURL
            {{- if and (eq .Values.api.config.storageType "s3") .Values.api.s3.existingSecret }}
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.s3.existingSecret }}
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.s3.existingSecret }}
                  key: S3_SECRET_KEY
            {{- end }}
            {{- if .Values.api.oidc.enabled }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: oidcClientSecret
            - name: OIDC_STATE_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: oidcStateCookieSecret
            {{- end }}
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.api.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.api.securityContext | nindent 12 }}
          {{- with .Values.api.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: api-config
              mountPath: /app/alluredeck/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if and .Values.api.persistence.projects.enabled (eq .Values.api.config.storageType "local") }}
            - name: projects
              mountPath: {{ .Values.api.config.staticContentProjects }}
            {{- end }}
            {{- with .Values.api.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- with .Values.api.sidecars }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        - name: api-config
          configMap:
            name: {{ include "alluredeck.api.fullname" . }}
        - name: tmp
          emptyDir: {}
        {{- if eq $kind "Deployment" }}
        {{- if and .Values.api.persistence.projects.enabled (eq .Values.api.config.storageType "local") }}
        - name: projects
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-projects" (include "alluredeck.api.fullname" .)) .Values.api.persistence.projects.existingClaim }}
        {{- end }}
        {{- end }}
        {{- with .Values.api.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if eq $kind "StatefulSet" }}
  volumeClaimTemplates:
    {{- if and .Values.api.persistence.projects.enabled (eq .Values.api.config.storageType "local") }}
    - metadata:
        name: projects
        labels:
          {{- include "alluredeck.api.labels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.api.persistence.projects.accessMode }}
        {{- $sc := default .Values.global.storageClassName .Values.api.persistence.projects.storageClassName }}
        {{- if $sc }}
        storageClassName: {{ $sc | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.api.persistence.projects.size }}
    {{- end }}
  {{- end }}
