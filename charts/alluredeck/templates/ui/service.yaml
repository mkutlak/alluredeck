apiVersion: v1
kind: Service
metadata:
  name: {{ include "alluredeck.ui.fullname" . }}
  labels:
    {{- include "alluredeck.ui.labels" . | nindent 4 }}
spec:
  type: {{ .Values.ui.service.type }}
  ports:
    - port: {{ .Values.ui.service.port }}
      targetPort: http-ui
      protocol: TCP
      name: http-ui
  selector:
    {{- include "alluredeck.ui.selectorLabels" . | nindent 4 }}
