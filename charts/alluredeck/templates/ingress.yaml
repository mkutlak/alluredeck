{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "alluredeck.fullname" . }}
  labels:
    {{- include "alluredeck.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.ingressClassName }}
  ingressClassName: {{ .Values.ingress.ingressClassName | quote }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - secretName: {{ .secretName }}
      hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
    {{- end }}
  {{- end }}
  rules:
    {{- if .Values.ingress.host }}
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "alluredeck.api.fullname" . }}
                port:
                  name: http-api
          - path: /trace
            pathType: Prefix
            backend:
              service:
                name: {{ include "alluredeck.api.fullname" . }}
                port:
                  name: http-api
          {{- if .Values.ingress.swagger.enabled }}
          - path: /swagger
            pathType: Prefix
            backend:
              service:
                name: {{ include "alluredeck.api.fullname" . }}
                port:
                  name: http-api
          {{- end }}
          {{- range .Values.ingress.extraPaths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ .serviceName }}
                port:
                  {{- if .servicePort }}
                  number: {{ .servicePort }}
                  {{- else }}
                  name: {{ .servicePortName | default "http" }}
                  {{- end }}
          {{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "alluredeck.ui.fullname" . }}
                port:
                  name: http-ui
    {{- end }}
{{- end }}
