{{- if and .Values.mcp.enabled (not .Values.mcp.security.existingSecret) (not .Values.api.security.existingSecret) }}
{{- $mcpSecret := lookup "v1" "Secret" .Release.Namespace (include "alluredeck.mcp.fullname" .) }}
{{- $legacyApi := lookup "v1" "Secret" .Release.Namespace (include "alluredeck.api.fullname" .) }}
{{- $signingKey := .Values.mcp.security.signingKey }}
{{- if and $mcpSecret (not $signingKey) }}
  {{- $signingKey = index $mcpSecret.data "mcpSigningKey" | b64dec }}
{{- else if and $legacyApi (not $signingKey) (hasKey $legacyApi.data "mcpSigningKey") }}
  {{- $signingKey = index $legacyApi.data "mcpSigningKey" | b64dec }}
{{- end }}
{{- if not $signingKey }}
  {{- $signingKey = randAlphaNum 64 }}
{{- end }}
{{- $jwtSecretKey := .Values.api.security.jwtSecretKey }}
{{- if and $mcpSecret (not $jwtSecretKey) }}
  {{- $jwtSecretKey = index $mcpSecret.data "jwtSecretKey" | b64dec }}
{{- else if and $legacyApi (not $jwtSecretKey) (hasKey $legacyApi.data "jwtSecretKey") }}
  {{- $jwtSecretKey = index $legacyApi.data "jwtSecretKey" | b64dec }}
{{- end }}
{{- if not $jwtSecretKey }}
  {{- $jwtSecretKey = randAlphaNum 64 }}
{{- end }}
{{- $databaseURL := .Values.api.config.databaseURL }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "alluredeck.mcp.fullname" . }}
  labels:
    {{- include "alluredeck.mcp.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  mcpSigningKey: {{ $signingKey | b64enc | quote }}
  jwtSecretKey: {{ $jwtSecretKey | b64enc | quote }}
  databaseURL: {{ $databaseURL | b64enc | quote }}
{{- end }}
