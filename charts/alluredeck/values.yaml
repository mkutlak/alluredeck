# AllureDeck Helm Chart — default values
# Override these in your own values file or via --set flags.

nameOverride: ""
fullnameOverride: ""

global:
  imagePullSecrets: []
  storageClassName: ""

# ---------------------------------------------------------------------------
# API (Go backend)
# ---------------------------------------------------------------------------
api:
  image:
    repository: ghcr.io/mkutlak/alluredeck-api
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent

  # Non-sensitive configuration (mounted as /app/alluredeck/config.yaml via ConfigMap)
  config:
    devMode: "false"
    logLevel: "info"
    storageType: "local"  # "local" or "s3"
    checkResultsEverySeconds: "NONE"
    keepHistory: "true"
    keepHistoryLatest: "20"
    apiResponseLessVerbose: "false"
    trustXForwardedFor: "true"
    swaggerEnabled: "false"
    makeViewerEndpointsPublic: "false"
    corsAllowedOrigins: []  # auto-computed from ui.ingress if empty; list of allowed origins
    maxUploadSizeMb: "100"  # Maximum upload size in MB for test results
    goMemLimit: "768MiB"  # Set to ~80% of resources.limits.memory to let GC reclaim before OOM kill
    staticContentProjects: "/data/projects"
    databaseURL: ""  # PostgreSQL connection string (required); set via DATABASE_URL env var or existingSecret

  # S3/MinIO connection settings (used when storageType=s3)
  # Authentication: use s3.existingSecret for static credentials (keys: S3_ACCESS_KEY, S3_SECRET_KEY),
  # or use IRSA on EKS via api.serviceAccount.annotations (no secret needed).
  s3:
    endpoint: ""          # e.g. "http://minio.minio.svc:9000"
    bucket: ""            # e.g. "allure-reports"
    region: "us-east-1"
    tlsInsecureSkipVerify: "false"  # skip TLS cert verification (e.g. self-signed certs)
    pathStyle: "false"    # "true" for MinIO
    concurrency: "10"
    existingSecret: ""    # pre-created K8s Secret with keys: S3_ACCESS_KEY, S3_SECRET_KEY

  # Security / auth credentials (mapped to Secret)
  security:
    enabled: "true"
    user: "admin"
    password: ""          # generate a strong password; empty = random on install
    viewerUser: "viewer"
    viewerPassword: ""    # generate a strong password; empty = random on install
    jwtSecretKey: ""      # REQUIRED in production; empty = random on install
    jwtAccessTokenExpires: "3600"
    jwtRefreshTokenExpires: "2592000"
    # Reference an existing Secret instead of creating one.
    # The Secret must contain the following keys:
    #   adminUser              - admin username
    #   adminPassword          - admin password
    #   viewerUser             - viewer username
    #   viewerPassword         - viewer password
    #   jwtSecretKey           - HMAC signing key for JWTs
    #   jwtAccessTokenExpires  - access token TTL in seconds
    #   jwtRefreshTokenExpires - refresh token TTL in seconds
    existingSecret: ""

  # Persistence
  persistence:
    projects:
      enabled: true       # only used when storageType=local
      existingClaim: ""
      storageClassName: ""    # uses global.storageClassName if empty
      accessMode: ReadWriteOnce
      size: 10Gi
    # database PVC removed: PostgreSQL is an external dependency, no local DB volume needed

  replicaCount: 1
  revisionHistoryLimit: 3

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    runAsNonRoot: true

  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  strategy: {}
    # type: Recreate
    # -- or --
    # type: RollingUpdate
    # rollingUpdate:
    #   maxSurge: 1
    #   maxUnavailable: 0

  service:
    type: ClusterIP
    port: 8080
    annotations: {}

  livenessProbe:
    httpGet:
      path: /health
      port: http-api
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /ready
      port: http-api
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  startupProbe:
    httpGet:
      path: /health
      port: http-api
    periodSeconds: 5
    failureThreshold: 12  # 12 * 5s = 60s max startup

  terminationGracePeriodSeconds: 35

  # Set to "StatefulSet" for stable PVC binding with local storage.
  # Deployment is fine for S3 storage or ephemeral/dev usage.
  kind: Deployment

  extraArgs: []
  extraEnv: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  initContainers: []
  sidecars: []
  lifecycle: {}
  priorityClassName: ""
  dnsPolicy: ""
  dnsConfig: {}

  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  serviceAccount:
    create: false
    name: ""
    annotations: {}
      # eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/alluredeck-api

  podAnnotations: {}
  podLabels: {}

# ---------------------------------------------------------------------------
# UI (React frontend served by Nginx)
# ---------------------------------------------------------------------------
ui:
  image:
    repository: ghcr.io/mkutlak/alluredeck-ui
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent

  config:
    apiUrl: ""         # defaults to internal API service name (in-cluster)
    appTitle: "AllureDeck"
    appVersion: ""     # defaults to Chart.appVersion

  replicaCount: 1
  revisionHistoryLimit: 3

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

  podSecurityContext:
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
    runAsNonRoot: true

  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  strategy: {}

  service:
    type: ClusterIP
    port: 8080
    annotations: {}

  livenessProbe:
    httpGet:
      path: /
      port: http-ui
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /
      port: http-ui
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  startupProbe:
    httpGet:
      path: /
      port: http-ui
    periodSeconds: 5
    failureThreshold: 6  # 6 * 5s = 30s max startup

  extraEnv: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  initContainers: []
  sidecars: []
  lifecycle: {}
  priorityClassName: ""
  dnsPolicy: ""
  dnsConfig: {}

  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  serviceAccount:
    create: false
    name: ""
    annotations: {}

  podAnnotations: {}
  podLabels: {}

# ---------------------------------------------------------------------------
# Ingress (single unified Ingress with path-based routing)
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  ingressClassName: ""
  annotations:
    # Required for nginx ingress to allow large uploads (default is 1m).
    # Should match or exceed api.config.maxUploadSizeMb.
    # nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  host: ""              # e.g. alluredeck.example.com
  tls: []
  # - secretName: alluredeck-tls
  #   hosts:
  #     - alluredeck.example.com
  api:
    path: /api
    pathType: Prefix
  swagger:
    enabled: false
    path: /swagger
    pathType: Prefix
  ui:
    path: /
    pathType: Prefix

# ---------------------------------------------------------------------------
# Network Policy
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: false
  # Selectors for the ingress controller pods that should be allowed to reach
  # the API and UI. Adjust for your ingress controller:
  #   nginx:   podSelector: { app.kubernetes.io/name: ingress-nginx }
  #   traefik: podSelector: { app.kubernetes.io/name: traefik }
  #   AWS ALB: namespaceSelector: { kubernetes.io/metadata.name: kube-system }
  # Leave both empty ({}) to allow from any namespace/pod (least restrictive).
  ingressController:
    podSelector:
      app.kubernetes.io/name: ingress-nginx
    namespaceSelector: {}

# ---------------------------------------------------------------------------
# Extra Resources
# ---------------------------------------------------------------------------
# Deploy arbitrary Kubernetes resources alongside the chart.
# Each list item is a full resource manifest.
# Example:
#   extraResources:
#     - apiVersion: secrets-store.csi.x-k8s.io/v1
#       kind: SecretProviderClass
#       metadata:
#         name: alluredeck-secrets
#       spec:
#         provider: aws
#         parameters:
#           objects: |
#             - objectName: "alluredeck/prod"
#               objectType: "secretsmanager"
extraResources: []
