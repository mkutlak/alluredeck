# AllureDeck Helm Chart — default values
# Override these in your own values file or via --set flags.

nameOverride: ""
fullnameOverride: ""

global:
  imagePullSecrets: []
  storageClassName: ""

# ---------------------------------------------------------------------------
# API (Go backend)
# ---------------------------------------------------------------------------
api:
  image:
    repository: ghcr.io/mkutlak/alluredeck-api
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent

  # Non-sensitive configuration (mounted as /app/alluredeck/config.yaml via ConfigMap)
  config:
    devMode: "false"
    logLevel: "info"
    storageType: "local"  # "local" or "s3"
    checkResultsEverySeconds: "NONE"
    keepHistory: "true"
    keepHistoryLatest: "100"
    keepHistoryMaxAgeDays: "0"
    apiResponseLessVerbose: "false"
    trustXForwardedFor: "true"
    swaggerEnabled: "false"
    makeViewerEndpointsPublic: "false"
    corsAllowedOrigins: []  # auto-computed from ui.ingress if empty; list of allowed origins
    maxUploadSizeMb: "100"  # Maximum upload size in MB for test results
    maxArchiveFileCount: "5000"  # Maximum files allowed in a tar.gz archive upload
    goMemLimit: "768MiB"  # Set to ~80% of resources.limits.memory to let GC reclaim before OOM kill
    # Maximum wall-clock time the background worker may spend on a single Allure
    # report generation job: download Allure results from storage, run the Allure
    # CLI, and upload the report back. Raise this for very large projects (>1 GiB
    # of results, or many video/screenshot attachments). Accepts a Go duration
    # string ("5m", "30m", "1h") or integer seconds.
    reportGenerationTimeout: "5m"
    staticContentProjects: "/data/projects"
    databaseURL: ""  # PostgreSQL connection string (required); set via DATABASE_URL env var or existingSecret

  # S3/MinIO connection settings (used when storageType=s3)
  # Authentication: use s3.existingSecret for static credentials (keys: S3_ACCESS_KEY, S3_SECRET_KEY),
  # or use IRSA on EKS via api.serviceAccount.annotations (no secret needed).
  s3:
    endpoint: ""          # e.g. "http://minio.minio.svc:9000"
    bucket: ""            # e.g. "allure-reports"
    region: "us-east-1"
    tlsInsecureSkipVerify: "false"  # skip TLS cert verification (e.g. self-signed certs)
    pathStyle: "false"    # "true" for MinIO
    concurrency: "10"
    existingSecret: ""    # pre-created K8s Secret with keys: S3_ACCESS_KEY, S3_SECRET_KEY

  # Security / auth credentials (mapped to Secret)
  security:
    enabled: "true"
    user: "admin"
    password: ""          # generate a strong password; empty = random on install
    viewerUser: "viewer"
    viewerPassword: ""    # generate a strong password; empty = random on install
    jwtSecretKey: ""      # REQUIRED in production; empty = random on install
    jwtAccessTokenExpires: "3600"
    jwtRefreshTokenExpires: "2592000"
    # Reference an existing Secret instead of creating one.
    # The Secret must contain the following keys:
    #   adminUser              - admin username
    #   adminPassword          - admin password
    #   viewerUser             - viewer username
    #   viewerPassword         - viewer password
    #   jwtSecretKey           - HMAC signing key for JWTs
    #   jwtAccessTokenExpires  - access token TTL in seconds
    #   jwtRefreshTokenExpires - refresh token TTL in seconds
    #   (if OIDC enabled):
    #   oidcClientSecret       - OIDC client secret
    #   oidcStateCookieSecret  - AES key for state cookie encryption (32 bytes)
    existingSecret: ""

  # OIDC SSO (optional — disabled by default)
  oidc:
    enabled: false
    issuerUrl: ""              # IdP discovery URL (e.g. https://login.microsoftonline.com/{tenant}/v2.0)
    clientId: ""               # OIDC client ID
    clientSecret: ""           # Confidential client secret; stored in Secret
    redirectUrl: ""            # Callback URL (e.g. https://alluredeck.example.com/api/v1/auth/oidc/callback)
    scopes: "openid,profile,email"
    groupsClaim: "groups"      # Claim name containing group memberships
    adminGroups: ""            # Comma-separated group IDs that map to admin role
    editorGroups: ""           # Comma-separated group IDs that map to editor role
    defaultRole: "viewer"      # Role for users not matching any group
    stateCookieSecret: ""      # AES-GCM key (32 bytes); empty = auto-generated on install
    postLoginRedirect: "/"     # Frontend URL after successful SSO login
    endSessionUrl: ""          # Optional RP-initiated logout URL

  # Persistence
  persistence:
    projects:
      enabled: true       # only used when storageType=local
      existingClaim: ""
      storageClassName: ""    # uses global.storageClassName if empty
      accessMode: ReadWriteOnce
      size: 10Gi
    # database PVC removed: PostgreSQL is an external dependency, no local DB volume needed

  replicaCount: 1
  revisionHistoryLimit: 3

  resources: {}
    # requests:
    #   cpu: 100m
    #   memory: 256Mi
    # limits:
    #   memory: 1Gi

  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    runAsNonRoot: true

  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  strategy: {}
    # type: Recreate
    # -- or --
    # type: RollingUpdate
    # rollingUpdate:
    #   maxSurge: 1
    #   maxUnavailable: 0

  service:
    type: ClusterIP
    port: 8080
    annotations: {}

  livenessProbe:
    httpGet:
      path: /health
      port: http-api
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /ready
      port: http-api
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  startupProbe:
    httpGet:
      path: /health
      port: http-api
    periodSeconds: 5
    failureThreshold: 12  # 12 * 5s = 60s max startup

  terminationGracePeriodSeconds: 35

  # Set to "StatefulSet" for stable PVC binding with local storage.
  # Deployment is fine for S3 storage or ephemeral/dev usage.
  kind: Deployment

  extraArgs: []
  extraEnv: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  initContainers: []
  sidecars: []
  lifecycle: {}
  priorityClassName: ""
  dnsPolicy: ""
  dnsConfig: {}

  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  serviceAccount:
    create: false
    name: ""
    annotations: {}
      # eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/alluredeck-api

  podAnnotations: {}
  podLabels: {}

# ---------------------------------------------------------------------------
# UI (React frontend served by Nginx)
# ---------------------------------------------------------------------------
ui:
  image:
    repository: ghcr.io/mkutlak/alluredeck-ui
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent

  config:
    apiUrl: ""         # defaults to internal API service name (in-cluster)
    appTitle: "AllureDeck"
    appVersion: ""     # defaults to Chart.appVersion

  replicaCount: 1
  revisionHistoryLimit: 3

  resources: {}
    # requests:
    #   cpu: 50m
    #   memory: 64Mi
    # limits:
    #   memory: 128Mi

  podSecurityContext:
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
    runAsNonRoot: true

  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  strategy: {}

  service:
    type: ClusterIP
    port: 8080
    annotations: {}

  livenessProbe:
    httpGet:
      path: /
      port: http-ui
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /
      port: http-ui
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  startupProbe:
    httpGet:
      path: /
      port: http-ui
    periodSeconds: 5
    failureThreshold: 6  # 6 * 5s = 30s max startup

  extraEnv: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  initContainers: []
  sidecars: []
  lifecycle: {}
  priorityClassName: ""
  dnsPolicy: ""
  dnsConfig: {}

  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  serviceAccount:
    create: false
    name: ""
    annotations: {}

  podAnnotations: {}
  podLabels: {}

# ---------------------------------------------------------------------------
# Ingress (single unified Ingress with path-based routing)
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  ingressClassName: ""
  annotations:
    # Required for nginx ingress to allow large uploads (default is 1m).
    # Should match or exceed api.config.maxUploadSizeMb.
    # nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  host: ""              # e.g. alluredeck.example.com
  tls: []
  # - secretName: alluredeck-tls
  #   hosts:
  #     - alluredeck.example.com
  # Hardcoded paths: /api and /trace → API service, / → UI service.
  # Swagger (/swagger → API service) is toggled here:
  swagger:
    enabled: false
  # Extra ingress paths inserted before the catch-all UI rule.
  # Example:
  #   extraPaths:
  #     - path: /custom
  #       pathType: Prefix
  #       serviceName: my-service
  #       servicePortName: http
  extraPaths: []

# ---------------------------------------------------------------------------
# Network Policy
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: false
  # Selectors for the ingress controller pods that should be allowed to reach
  # the API and UI. Adjust for your ingress controller:
  #   nginx:   podSelector: { app.kubernetes.io/name: ingress-nginx }
  #   traefik: podSelector: { app.kubernetes.io/name: traefik }
  #   AWS ALB: namespaceSelector: { kubernetes.io/metadata.name: kube-system }
  # Leave both empty ({}) to allow from any namespace/pod (least restrictive).
  ingressController:
    podSelector:
      app.kubernetes.io/name: ingress-nginx
    namespaceSelector: {}

# ---------------------------------------------------------------------------
# Observability (OpenTelemetry traces + Prometheus metrics)
# ---------------------------------------------------------------------------
# Master switch. When false (default), no OTEL_* env vars are injected and the
# metrics Service / ServiceMonitor are not created. Safe to leave disabled for
# users who do not run an OTLP collector or Prometheus Operator.
observability:
  enabled: false

  # Resource attribute: service.name sent with every span and metric.
  serviceName: "alluredeck-api"

  # Resource attribute: deployment.environment (e.g. "production", "staging").
  # Leave empty to omit the attribute.
  environment: ""

  # OTLP trace export settings.
  traces:
    # OTLP endpoint for the collector (HTTP). Example:
    #   "http://otel-collector.observability.svc:4318"
    endpoint: ""
    # Transport protocol: "http/protobuf" (default) or "grpc".
    protocol: "http/protobuf"
    # Ratio of traces to sample: 1.0 = 100 %, 0.1 = 10 %, 0.0 = off.
    sampleRatio: 1.0
    # Set true to disable TLS for local / in-cluster collectors.
    insecure: false

  # Prometheus metrics endpoint served on a dedicated port (separate from the
  # main API port so that CSRF/auth middleware does not intercept scrapes).
  metrics:
    # When true, the API exposes /metrics on the port below and a separate
    # ClusterIP Service (service-metrics.yaml) is created for Prometheus to scrape.
    enabled: true
    # Container port (and Service targetPort) for the metrics HTTP server.
    port: 9464
    # Path that Prometheus scrapes.
    path: "/metrics"

  # Prometheus Operator ServiceMonitor resource (requires metrics.enabled=true).
  serviceMonitor:
    # When true, a ServiceMonitor resource is created so Prometheus Operator
    # automatically discovers and scrapes the metrics endpoint.
    enabled: false
    # How often Prometheus scrapes the metrics endpoint.
    interval: "30s"
    # Maximum time Prometheus waits for a scrape response.
    scrapeTimeout: "10s"
    # Extra labels added to the ServiceMonitor metadata. Use these to match
    # your Prometheus Operator's serviceMonitorSelector, e.g.:
    #   labels:
    #     prometheus: kube-prometheus
    labels: {}
    # RelabelConfigs applied to scrape targets before ingestion.
    relabelings: []
    # MetricRelabelConfigs applied to scraped metrics before storage.
    metricRelabelings: []

# ---------------------------------------------------------------------------
# Extra Resources
# ---------------------------------------------------------------------------
# Deploy arbitrary Kubernetes resources alongside the chart.
# Each list item is a full resource manifest.
# Example:
#   extraResources:
#     - apiVersion: secrets-store.csi.x-k8s.io/v1
#       kind: SecretProviderClass
#       metadata:
#         name: alluredeck-secrets
#       spec:
#         provider: aws
#         parameters:
#           objects: |
#             - objectName: "alluredeck/prod"
#               objectType: "secretsmanager"
extraResources: []
