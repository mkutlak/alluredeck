name: CI — UI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "ui/**"
      - "mise.toml"
      - "mise.lock"
      - ".github/workflows/ci-ui.yml"

permissions:
  contents: read

jobs:
  ui-check:
    name: UI quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v2

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('ui/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install dependencies
        run: mise run ui:install

      - name: Type check
        run: mise run ui:typecheck

      - name: Lint
        run: mise run ui:lint

      - name: Test
        run: mise run ui:coverage
