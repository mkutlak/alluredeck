name: Release Helm Chart

on:
  push:
    branches: [main]
    paths:
      - "charts/**"

permissions:
  contents: read
  packages: write

jobs:
  release-chart:
    name: Release Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v4

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Read chart version
        id: version
        run: |
          VERSION=$(yq '.version' charts/alluredeck/Chart.yaml)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: echo "${GITHUB_TOKEN}" | helm registry login ghcr.io -u "${ACTOR}" --password-stdin

      - name: Package and push Helm chart
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          helm package charts/alluredeck
          helm push alluredeck-${VERSION}.tgz oci://ghcr.io/mkutlak/charts
