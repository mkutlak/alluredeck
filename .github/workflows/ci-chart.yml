name: CI — Helm Chart

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "charts/**"
      - ".github/workflows/ci-chart.yml"

permissions:
  contents: read

jobs:
  chart-lint:
    name: Helm chart lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint charts/alluredeck

      - name: Template chart (validate rendering)
        run: helm template alluredeck charts/alluredeck --debug
