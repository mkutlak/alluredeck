name: CI — API Integration

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "api/**"
      - "mise.toml"
      - "mise.lock"
      - ".github/workflows/ci-api-integration.yml"

permissions:
  contents: read

jobs:
  api-integration:
    name: API integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: alluredeck
          POSTGRES_PASSWORD: alluredeck
          POSTGRES_DB: alluredeck
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alluredeck"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v2

      - name: Cache Go build & modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('api/go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - name: Run integration tests
        run: mise run api:test-integration
        env:
          TEST_POSTGRES_URL: postgres://alluredeck:alluredeck@localhost:5432/alluredeck?sslmode=disable
