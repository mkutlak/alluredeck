name: Release

on:
  workflow_dispatch:
    inputs:
      force-release:
        description: "Force semantic-release to run (useful after path-ignore skips)"
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths-ignore:
      - "charts/**"
      - "*.md"
      - "docs/**"

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/mkutlak/alluredeck-api
  IMAGE_UI: ghcr.io/mkutlak/alluredeck-ui

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: API tests
        working-directory: api
        run: go test -race ./...

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: UI install
        working-directory: ui
        run: npm ci

      - name: UI tests
        working-directory: ui
        run: npm run test

  release:
    name: Semantic release
    needs: test
    runs-on: ubuntu-latest
    outputs:
      new-release-published: ${{ steps.semantic.outputs.new_release_published }}
      new-release-version: ${{ steps.semantic.outputs.new_release_version }}
      new-release-git-tag: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-images:
    name: Build and push image
    needs: release
    if: needs.release.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: alluredeck-api
            dockerfile: docker/Dockerfile.api
          - image: alluredeck-ui
            dockerfile: docker/Dockerfile.ui
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.new-release-git-tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/mkutlak/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.new-release-version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.new-release-version }}
            type=semver,pattern={{major}},value=${{ needs.release.outputs.new-release-version }}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ needs.release.outputs.new-release-version }}
            VITE_APP_VERSION=${{ needs.release.outputs.new-release-version }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            BUILD_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/mkutlak/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
