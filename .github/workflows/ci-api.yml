name: CI — API

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "api/**"
      - "mise.toml"
      - "mise.lock"
      - ".github/workflows/ci-api.yml"

permissions:
  contents: read

jobs:
  api-check:
    name: API quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v2

      - name: Cache Go build & modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('api/go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - name: go vet
        run: mise run api:vet

      - name: golangci-lint
        run: mise run api:lint

      - name: go test
        run: mise run api:test
