services:
  alluredeck-ui:
    image: alluredeck-ui:dev
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    environment:
      VITE_API_URL: "${VITE_API_URL:-http://localhost:5050/api/v1}"
      VITE_APP_TITLE: "${VITE_APP_TITLE:-AllureDeck}"
      VITE_APP_VERSION: "${VITE_APP_VERSION:-dev}"
    ports:
      - "7474:8080"
    depends_on:
      - allure-api
    restart: unless-stopped

  allure-api:
    image: alluredeck-api:dev
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      SWAGGER_ENABLED: "1"
      SECURITY_ENABLED: "1"
      ADMIN_USER: "${ADMIN_USER:-admin}"
      ADMIN_PASS: "${ADMIN_PASS:-admin}"
      VIEWER_USER: "${VIEWER_USER:-viewer}"
      VIEWER_PASS: "${VIEWER_PASS:-viewer}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-68af59c5a580cf01e094ff4cf6722203c6e2a6de6ed6c3fb8185bfac9c490f3e}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:7474}"
      KEEP_HISTORY: "1"
      KEEP_HISTORY_LATEST: "20"
      # KEEP_HISTORY_MAX_AGE_DAYS: "0"
      CHECK_RESULTS_EVERY_SECONDS: "NONE"
      GOMEMLIMIT: "1GiB"
      DATABASE_URL: "postgresql://allure:allure@postgres:5432/allure?sslmode=disable"
      # OIDC SSO (optional)
      # OIDC_ENABLED: "false"
      # OIDC_ISSUER_URL: ""
      # OIDC_CLIENT_ID: ""
      # OIDC_CLIENT_SECRET: ""
      # OIDC_REDIRECT_URL: ""
      # OIDC_SCOPES: "openid,profile,email"
      # OIDC_GROUPS_CLAIM: "groups"
      # OIDC_ADMIN_GROUPS: ""
      # OIDC_EDITOR_GROUPS: ""
      # OIDC_DEFAULT_ROLE: "viewer"
      # OIDC_STATE_COOKIE_SECRET: ""
      # OIDC_POST_LOGIN_REDIRECT: "/"
    ports:
      - "5050:8080"
    volumes:
      - allure-projects:/data/projects
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  alluredeck-mcp:
    image: alluredeck-mcp:dev
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
    environment:
      ENABLE_MCP_SERVER: "true"
      # MCP_ALLOWED_ORIGINS: ""
      DATABASE_URL: "postgresql://allure:allure@postgres:5432/allure?sslmode=disable"
      SECURITY_ENABLED: "1"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-68af59c5a580cf01e094ff4cf6722203c6e2a6de6ed6c3fb8185bfac9c490f3e}"
      # DEV ONLY: replace MCP_SIGNING_KEY with a real secret in production
      MCP_SIGNING_KEY: "${MCP_SIGNING_KEY:-dev-only-replace-in-prod}"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: allure
      POSTGRES_USER: allure
      POSTGRES_PASSWORD: allure
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allure"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  allure-projects:
  postgres_data:
