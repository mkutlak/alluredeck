volumes:
  alluredeck:
    driver: local

services:
  alluredeck-api:
    platform: linux/amd64
    image: alluredeck-api:dev
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
      args:
        BUILD_VERSION: 3.2.0
    environment:
      DEV_MODE: 0
      CHECK_RESULTS_EVERY_SECONDS: NONE
      KEEP_HISTORY: 1
      KEEP_HISTORY_LATEST: 5
      SECURITY_USER: "my_username"
      SECURITY_PASS: "my_password"
      SECURITY_VIEWER_USER: "view_user"
      SECURITY_VIEWER_PASS: "view_pass"
      SECURITY_ENABLED: 0
      MAKE_VIEWER_ENDPOINTS_PUBLIC: 0
      API_RESPONSE_LESS_VERBOSE: 0
      TLS: 0
      GOMEMLIMIT: "1GiB"
    ports:
      - "${ALLUREDECK_API_PORT:-5050}:8080"
    volumes:
      - ../.data/alluredeck/allure-results:/app/allure-results
