volumes:
  alluredeck:
    driver: local
  postgres_data:

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: allure
      POSTGRES_USER: allure
      POSTGRES_PASSWORD: allure
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allure"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  alluredeck-api:
    platform: linux/amd64
    image: alluredeck-api:dev
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
      args:
        BUILD_VERSION: 3.2.0
    environment:
      DEV_MODE: 0
      CHECK_RESULTS_EVERY_SECONDS: NONE
      KEEP_HISTORY: 1
      KEEP_HISTORY_LATEST: 5
      ADMIN_USER: "my_username"
      ADMIN_PASS: "my_password"
      VIEWER_USER: "view_user"
      VIEWER_PASS: "view_pass"
      SECURITY_ENABLED: 0
      MAKE_VIEWER_ENDPOINTS_PUBLIC: 0
      API_RESPONSE_LESS_VERBOSE: 0
      TLS: 0
      GOMEMLIMIT: "1GiB"
      DATABASE_URL: "postgresql://allure:allure@postgres:5432/allure?sslmode=disable"
    ports:
      - "${ALLUREDECK_API_PORT:-5050}:8080"
    volumes:
      - ../.data/alluredeck/allure-results:/app/allure-results
    depends_on:
      postgres:
        condition: service_healthy
