<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playwright Report — E2E Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; background: #f8f9fa; }
    .container { max-width: 600px; margin: 4rem auto; text-align: center; }
    h1 { color: #2e7d32; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 14px; }
    .pass { background: #c8e6c9; color: #2e7d32; }
    table { margin: 2rem auto; border-collapse: collapse; }
    td, th { padding: 8px 16px; border: 1px solid #ddd; text-align: left; }
    th { background: #e3f2fd; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Playwright Report</h1>
    <p>E2E Demo — Sample Report</p>
    <p><span class="badge pass">1 passed</span></p>
    <table>
      <tr><th>Test</th><th>Status</th><th>Duration</th></tr>
      <tr><td>Sample dashboard test</td><td>passed</td><td>5.0s</td></tr>
    </table>
    <p style="color: #888; font-size: 12px;">Generated for AllureDeck e2e testing</p>
  </div>
</body>
</html>
