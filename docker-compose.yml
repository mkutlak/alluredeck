services:
  allure-dashboard-ui:
    image: allure-dashboard-ui:dev-api
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      VITE_API_URL: "${VITE_API_URL:-http://localhost:5050}"
      VITE_APP_TITLE: "${VITE_APP_TITLE:-Allure Dashboard}"
    ports:
      - "7474:7474"
    depends_on:
      - allure-api
    restart: unless-stopped

  allure-api:
    image: allure-docker-service:dev-ui
    build:
      context: ../allure-docker-service
      dockerfile: docker/Dockerfile
    environment:
      SECURITY_ENABLED: "1"
      SECURITY_USER: "${SECURITY_USER:-admin}"
      SECURITY_PASS: "${SECURITY_PASS:-admin}"
      SECURITY_VIEWER_USER: "${SECURITY_VIEWER_USER:-viewer}"
      SECURITY_VIEWER_PASS: "${SECURITY_VIEWER_PASS:-viewer}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-68af59c5a580cf01e094ff4cf6722203c6e2a6de6ed6c3fb8185bfac9c490f3e}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:7474}"
      KEEP_HISTORY: "1"
      KEEP_HISTORY_LATEST: "20"
      CHECK_RESULTS_EVERY_SECONDS: "NONE"
    ports:
      - "5050:5050"
    volumes:
      - allure-projects:/app/projects
    restart: unless-stopped

volumes:
  allure-projects:
